<div class="login-page">
  <div id="particles-js"></div>
  <div class="login-glow"></div>

  <div class="login-box">
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="LunexIA" class="logo-img" />
      <span class="logo-name">LunexIA</span>
    </div>

    <div class="login-header">
      <h2>Bem-vindo a sua Dashboard!</h2>
      <p>Acesse o painel do seu restaurante</p>
    </div>

    <div class="erro" *ngIf="erro">{{ erroMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="fazerLogin()">
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            formControlName="login"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
        <span
          class="msg-erro"
          *ngIf="mostrarErros && form.get('login')?.invalid"
        >
          Email inválido ou obrigatório
        </span>
      </div>

      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            formControlName="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <span
          class="msg-erro"
          *ngIf="mostrarErros && form.get('senha')?.invalid"
        >
          Senha obrigatória
        </span>
      </div>

      <button class="btn" type="submit" [disabled]="carregando">
        <span *ngIf="!carregando"
          >Entrar <i class="bi bi-arrow-right"></i
        ></span>
        <span *ngIf="carregando"
          ><i class="bi bi-arrow-repeat spin"></i> Entrando...</span
        >
      </button>
    </form>

    <p class="footer-text">Powered by <strong>LunexIA</strong></p>
  </div>
</div>
