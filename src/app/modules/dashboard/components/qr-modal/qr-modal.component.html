<div class="modal-overlay" *ngIf="mostrar" (click)="fecharModal()">
  <div class="qr-card" (click)="$event.stopPropagation()">

    <!-- View de Carregando / QR Code -->
    <div *ngIf="!conectado" class="qr-main-view">
      <h3>📱 Conectar WhatsApp</h3>
      <p class="subtitle">Abra o WhatsApp → Dispositivos conectados → Conectar dispositivo</p>

      <div class="qr-container">
        <!-- Loading -->
        <div *ngIf="carregando" class="loading-spinner">
          <div class="spinner"></div>
        </div>

        <!-- QR Code -->
        <img *ngIf="!carregando && qrUrl" [src]="qrUrl" class="qr-image" alt="QR Code WhatsApp" />
      </div>

      <div class="status-waiting">
        <div class="spinner-mini"></div>
        <span>AGUARDANDO LEITURA...</span>
      </div>
    </div>

    <!-- View de Sucesso -->
    <div *ngIf="conectado" class="success-view">
      <i class="bi bi-check-circle-fill success-icon"></i>
      <h3>Conectado!</h3>
      <p>Sincronizando seu Dashboard...</p>
    </div>

  </div>
</div>
