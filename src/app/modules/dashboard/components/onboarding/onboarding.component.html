<div class="onboarding-overlay">
  <div class="onboarding-box">
    <div class="onboarding-icon">
      <i class="bi bi-shop"></i>
    </div>
    <h2>Bem-vindo ao LunexIA !!! 🎉</h2>
    <p>Antes de começar, defina o horário de funcionamento do seu restaurante.</p>
    <p class="sub">O painel abrirá e fechará automaticamente neste horário.</p>

    <div class="horario-grid">
      <div class="field">
        <label><i class="bi bi-sunrise"></i> Abertura</label>
        <input type="time" [(ngModel)]="abertura" />
      </div>
      <div class="field">
        <label><i class="bi bi-sunset"></i> Fechamento</label>
        <input type="time" [(ngModel)]="fechamento" />
      </div>
    </div>

    <div class="dias-section">
      <label class="dias-label">Dias de funcionamento</label>
      <div class="dias-grid">
        <button
          *ngFor="let dia of diasSemana"
          class="dia-btn"
          [class.ativo]="diasSelecionados.includes(dia.valor)"
          (click)="toggleDia(dia.valor)"
        >
          {{ dia.label }}
        </button>
      </div>
    </div>

    <button class="btn-salvar" (click)="salvar()" [disabled]="diasSelecionados.length === 0">
      <i class="bi bi-check-lg"></i> Confirmar e Começar
    </button>
  </div>
</div>
