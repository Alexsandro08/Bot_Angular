<div class="crop-overlay" *ngIf="aberto" (click)="fechar()">
  <div class="crop-box" (click)="$event.stopPropagation()">
    <h3>Ajustar Logo</h3>
    <p style="color:#8892a4; font-size:12px; text-align:center; margin-bottom:12px;">
      Arraste para mover • Scroll para zoom
    </p>
    <div class="crop-container">
      <canvas id="crop-canvas" style="border-radius:12px; cursor:grab"></canvas>
    </div>
    <div class="crop-actions">
      <button class="btn-cancelar" (click)="fechar()">Cancelar</button>
      <button class="btn-confirmar" (click)="confirmar()" [disabled]="salvando">
        <span *ngIf="!salvando"><i class="bi bi-check-lg"></i> Confirmar</span>
        <span *ngIf="salvando"><span class="spinner-btn"></span> Salvando...</span>
      </button>
    </div>
  </div>
</div>
