<div class="sidebar" [class.open]="menuAberto">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon logo-upload" (click)="logoInput.click()">
      <div *ngIf="!logoUrl" class="logo-skeleton"></div>
      <img *ngIf="logoUrl" [src]="logoUrl" alt="logo" class="logo-img" />
      <div class="logo-edit-overlay"><i class="bi bi-pencil-fill"></i></div>
      <input
        #logoInput
        type="file"
        accept="image/*"
        style="display: none"
        (change)="uploadLogo($event)"
      />
    </div>
    <span class="sidebar-nome">{{ nomeRestaurante || "LunexIA" }}</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <a
      [class.active]="paginaAtual === 'dashboard'"
      (click)="navegar('dashboard'); fecharMenu()"
    >
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a
      [class.active]="paginaAtual === 'produtos'"
      (click)="navegar('produtos'); fecharMenu()"
    >
      <i class="bi bi-box-seam"></i> Produtos
    </a>
    <a
      [class.active]="paginaAtual === 'relatorios'"
      (click)="navegar('relatorios'); fecharMenu()"
    >
      <i class="bi bi-bar-chart-line"></i> Relatórios
    </a>
    <a
      [class.active]="paginaAtual === 'suporte'"
      (click)="navegar('suporte'); fecharMenu()"
      class="nav-suporte"
    >
      <i class="bi bi-headset"></i> Suporte ao Cliente
    </a>
  </nav>

  <!-- Rodapé da sidebar -->
  <div class="sidebar-footer">
    <!-- Status Loja -->
    <button
      class="btn-loja"
      [class.aberta]="lojaAberta"
      [class.fechada]="!lojaAberta"
      (click)="toggleLoja()"
      [class.alerta]="alertaFechamento"
    >
      <span
        class="status-dot-loja"
        [class.dot-online]="lojaAberta"
        [class.dot-offline]="!lojaAberta"
      ></span>
      <span>{{ lojaAberta ? "Loja Aberta" : "Loja Fechada" }}</span>
      <span class="horario-label" *ngIf="horario"
        >{{ horario.abertura }} - {{ horario.fechamento }}</span
      >
    </button>
  </div>

  <div class="sidebar-actions topbar-actions">
    <button
      class="btn-som"
      (click)="toggleSom()"
      [title]="somAtivo ? 'Desativar som' : 'Ativar som'"
    >
      <i
        class="bi"
        [class.bi-volume-up-fill]="somAtivo"
        [class.bi-volume-mute-fill]="!somAtivo"
      ></i>
    </button>

    <app-notifications></app-notifications>

    <div class="config-wrapper">
      <button
        class="btn-config"
        (click)="toggleConfigMenu()"
        title="Configurações"
      >
        <i class="bi bi-gear"></i>
      </button>
      <div class="config-menu" *ngIf="configMenuAberto">
        <button (click)="editarHorario(); fecharConfigMenu()">
          <i class="bi bi-clock"></i> Horário
        </button>
        <button (click)="abrirMotivoFechamento(); fecharConfigMenu()">
          <i class="bi bi-exclamation-circle"></i> Aviso de fechamento
        </button>
      </div>
    </div>

    <div
      class="avatar-bot"
      [class.online]="botOnline"
      (click)="toggleAvatarInfo()"
    >
      <img src="assets/logo.png" alt="logo" class="logo" />
      <span
        class="avatar-dot"
        [class.dot-online]="botOnline"
        [class.dot-offline]="!botOnline"
      ></span>
      <div class="avatar-popup" *ngIf="mostrarInfo" [class.online]="botOnline">
        <div class="popup-status">
          <span class="pulse-ring" *ngIf="botOnline"></span>
          <img src="assets/logo.png" alt="logo" class="logo" />
        </div>
        <strong>Bot {{ botOnline ? "Online" : "Offline" }}</strong>
        <small>{{ botOnline ? "Recebendo pedidos" : "Desconectado" }}</small>
      </div>
    </div>
  </div>

  <!-- Hamburguer mobile -->
  <button
    class="btn-hamburger"
    (click)="toggleMenu()"
    [class.open]="menuAberto"
  >
    <span></span><span></span><span></span>
  </button>

  <!-- Modal Crop (sem alteração) -->
  <div class="crop-overlay" *ngIf="cropModalAberto" (click)="fecharCrop()">
    <div class="crop-box" (click)="$event.stopPropagation()">
      <h3>Ajustar Logo</h3>
      <p
        style="
          color: #8892a4;
          font-size: 12px;
          text-align: center;
          margin-bottom: 12px;
        "
      >
        Arraste para mover • Scroll para zoom
      </p>
      <div class="crop-container">
        <canvas
          id="crop-canvas"
          width="300"
          height="300"
          style="border-radius: 12px; cursor: grab"
        ></canvas>
      </div>
      <div class="crop-actions">
        <button class="btn-cancelar" (click)="fecharCrop()">Cancelar</button>
        <button
          class="btn-confirmar"
          (click)="confirmarCrop()"
          [disabled]="salvandoLogo"
        >
          <span *ngIf="!salvandoLogo"
            ><i class="bi bi-check-lg"></i> Confirmar</span
          >
          <span *ngIf="salvandoLogo"
            ><span class="spinner-btn"></span> Salvando...</span
          >
        </button>
      </div>
    </div>
  </div>
</div>
