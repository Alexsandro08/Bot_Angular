<div class="dashboard-container">
  <div id="particles-js"></div>
  <ng-container *ngIf="!carregando">
    <app-onboarding
      *ngIf="mostrarOnboarding"
      (concluido)="onOnboardingConcluido()"
    ></app-onboarding>
  </ng-container>
  <app-qr-modal></app-qr-modal>

  <div class="dashboard-wrapper">
    <div class="header-row">
      <app-header
        [paginaAtual]="paginaAtual"
        (paginaMudou)="trocarPagina($event)"
      ></app-header>
    </div>

    <ng-container [ngSwitch]="paginaAtual">
      <div *ngSwitchCase="'dashboard'" class="page-view">
        <app-stats-grid></app-stats-grid>
        <div class="main-layout">
          <app-orders-panel></app-orders-panel>
          <app-sidebar></app-sidebar>
        </div>
      </div>

      <div *ngSwitchCase="'produtos'" class="page-view">
        <app-produtos></app-produtos>
      </div>

      <div *ngSwitchCase="'relatorios'" class="page-view">
        <app-relatorios></app-relatorios>
      </div>

      <div *ngSwitchCase="'suporte'" class="page-view">
        <app-suporte></app-suporte>
      </div>
    </ng-container>
  </div>

  <div class="saindo-overlay" *ngIf="mostrarSaindo">
    <div class="saindo-box">
      <span class="emoji">😢</span>
      <h2>Poxa...</h2>
      <p>Estamos te deslogando por falta de renovação.</p>
      <small>Entre em contato para renovar sua assinatura.</small>
    </div>
  </div>
</div>
